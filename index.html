<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Color Table Tool</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  table { border-collapse: collapse; margin-top: 10px; text-align: center; font-family: 'Roboto', sans-serif; font-size: 14px; }
  td { border: 1px solid #ccc; padding: 10px; text-align: center; min-width: 120px; }
  
  /* Ô chọn màu nhỏ gọn */
  .color-group { display: flex; align-items: center; justify-content: center; gap: 5px; }
  .picker { width: 30px !important; height: 30px; padding: 0; border: none; cursor: pointer; background: none; vertical-align: middle; }
  .hex-input { width: 70px !important; text-align: center; }
  
  .header-label { font-weight: bold; width: 80px; background: #f2f2f2; }
  .preview-text { font-weight: bold; }
  .controls { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
  textarea { width: 100%; height: 220px; margin-top: 15px; font-family: monospace; }
</style>
</head>
<body>

<div class="controls">
  <label><strong>Theme:</strong></label>
  <input type="color" id="theme-picker" class="picker" value="#ffffff" oninput="syncTheme(this, 'theme')">
  <input id="theme" class="hex-input" value="#ffffff" oninput="syncThemeText(this, 'theme-picker')">
  
  <button onclick="addColumn()" style="margin-left: 15px;">➕ Thêm cột</button> 
  <button onclick="generate()" style="cursor: pointer;">Generate Snapshot</button>
</div>

<table id="tbl">
  <tr id="row-red-input"><td rowspan="2" class="header-label" style="color:red">RED</td></tr>
  <tr id="row-red"></tr>

  <tr id="row-green-input"><td rowspan="2" class="header-label" style="color:green">GREEN</td></tr>
  <tr id="row-green"></tr>

  <tr id="row-yellow-input"><td rowspan="2" class="header-label" style="color:#d4a017">YELLOW</td></tr>
  <tr id="row-yellow"></tr>
</table>

<textarea id="output" placeholder="HTML snapshot sẽ xuất hiện ở đây"></textarea>

<script>
let colId = 0;

// Đồng bộ cho Theme
function syncTheme(picker, textId) {
    document.getElementById(textId).value = picker.value;
    render();
}
function syncThemeText(text, pickerId) {
    if(/^#[0-9A-F]{6}$/i.test(text.value)) {
        document.getElementById(pickerId).value = text.value;
    }
    render();
}

// Đồng bộ cho các ô màu trong bảng
function sync(picker, textId) {
    document.getElementById(textId).value = picker.value;
    render();
}
function syncText(text, pickerId) {
    if(/^#[0-9A-F]{6}$/i.test(text.value)) {
        document.getElementById(pickerId).value = text.value;
    }
    render();
}

function createInputCell(color) {
  colId++;
  const pId = `p${colId}`;
  const tId = `t${colId}`;
  const td = document.createElement("td");
  td.innerHTML = `
    <div class="color-group">
        <input type="color" id="${pId}" class="picker" value="${color}" oninput="sync(this, '${tId}')">
        <input type="text" id="${tId}" class="hex-input" value="${color}" oninput="syncText(this, '${pId}')">
    </div>`;
  return td;
}

function addColumn() {
  document.getElementById("row-red-input").appendChild(createInputCell("#ff4d4f"));
  document.getElementById("row-green-input").appendChild(createInputCell("#52c41a"));
  document.getElementById("row-yellow-input").appendChild(createInputCell("#fadb14"));
  render();
}

function renderRow(renderRowId, inputRowId) {
  const theme = document.getElementById("theme").value;
  const renderRow = document.getElementById(renderRowId);
  const inputs = document.querySelectorAll(`#${inputRowId} .hex-input`);
  
  renderRow.innerHTML = "";
  inputs.forEach(inp => {
    const td = document.createElement("td");
    td.style.background = theme;
    const span = document.createElement("span");
    span.className = "preview-text";
    span.style.color = inp.value;
    span.innerText = "Placeholder";
    td.appendChild(span);
    renderRow.appendChild(td);
  });
}

function render() {
  renderRow("row-red", "row-red-input");
  renderRow("row-green", "row-green-input");
  renderRow("row-yellow", "row-yellow-input");
}

function generate() {
  const theme = document.getElementById("theme").value;
  let html = `<table style="border-collapse:collapse; text-align:center; font-family:sans-serif;">\n`;

  const configs = [
      {label: 'RED', color: 'red', inputRow: 'row-red-input'},
      {label: 'GREEN', color: 'green', inputRow: 'row-green-input'},
      {label: 'YELLOW', color: '#d4a017', inputRow: 'row-yellow-input'}
  ];

  configs.forEach(conf => {
    const inputs = document.querySelectorAll(`#${conf.inputRow} .hex-input`);
    
    // Hàng 1: Label + Mã Hex
    html += `  <tr>\n    <td rowspan="2" style="border:1px solid #ccc; padding:10px; font-weight:bold; color:${conf.color}; background:#f2f2f2;">${conf.label}</td>\n`;
    inputs.forEach(inp => {
      html += `    <td style="border:1px solid #ccc; padding:10px; font-family:monospace;">${inp.value.toUpperCase()}</td>\n`;
    });
    html += `  </tr>\n`;

    // Hàng 2: Placeholder Render trên nền Theme
    html += `  <tr>\n`;
    inputs.forEach(inp => {
      html += `    <td style="border:1px solid #ccc; padding:10px; background:${theme};">\n      <span style="color:${inp.value}; font-weight:bold;">Placeholder</span>\n    </td>\n`;
    });
    html += `  </tr>\n`;
  });

  html += `</table>`;
  document.getElementById("output").value = html;
}

// Khởi tạo mặc định 2 cột
addColumn();
addColumn();
</script>
</body>
</html>
