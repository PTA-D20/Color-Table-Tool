<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Color Table Tool - Pixel Perfect Match</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');

  /* Style cho bảng điều khiển */
  body { font-family: 'Roboto', sans-serif; padding: 20px; background-color: #f8f9fa; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  table { border-collapse: collapse; margin-top: 10px; text-align: center; font-size: 14px; background: white; }
  td, th { border: 1px solid #ccc; padding: 12px; text-align: center; min-width: 160px; position: relative; }
  
  .theme-controls { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
  .control-group { display: flex; align-items: center; gap: 8px; border-left: 2px solid #eee; padding-left: 15px; }
  .control-group:first-child { border-left: none; padding-left: 0; }
  
  .picker { width: 30px; height: 30px; padding: 0; border: none; cursor: pointer; background: none; vertical-align: middle; }
  .hex-input, .label-input { width: 90%; padding: 6px; border: 1px solid #ccc; border-radius: 3px; text-align: center; font-family: monospace; }
  .label-input { font-family: 'Roboto', sans-serif; font-weight: 500; background: #fffde7; }
  
  .btn-del-col {
    position: absolute; top: 2px; right: 2px;
    background: #ff4d4f; color: white; border: none; border-radius: 3px;
    width: 18px; height: 18px; font-size: 10px; cursor: pointer;
    line-height: 18px; padding: 0; opacity: 0.4; transition: 0.2s;
  }
  .btn-del-col:hover { opacity: 1; }

  /* Style hiển thị trên bảng (Live) */
  .tippy-style-live {
    font-family: 'Roboto', sans-serif;
    font-weight: 400;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
    letter-spacing: 0.1px;
    -webkit-font-smoothing: antialiased;
  }

  .header-label { font-weight: 500; width: 80px; background: #f2f2f2; }
  textarea { width: 100%; height: 200px; margin-top: 15px; font-family: monospace; padding: 10px; border: 1px solid #ccc; font-size: 12px; background: #222; color: #7fdbff; }
  
  button { padding: 8px 15px; cursor: pointer; font-weight: 500; border-radius: 4px; border: 1px solid #ccc; }
  .btn-gen { background: #27ae60; color: white; border: none; }
  
  .tickers-container { display: flex; flex-direction: column; align-items: flex-start; margin-top: 8px; gap: 4px; width: fit-content; margin-left: auto; margin-right: auto; }
  .ticker-wrap { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #555; cursor: pointer; }
</style>
</head>
<body>

<div class="theme-controls">
  <div class="control-group">
    <strong>Theme:</strong>
    <input type="color" id="theme-picker" class="picker" value="#2d2d2d" oninput="syncTheme('picker')">
    <input type="text" id="theme-hex" class="hex-input" style="width:75px" value="#2d2d2d" oninput="syncTheme('hex')">
  </div>
  <div class="control-group">
    <label>Alpha:</label>
    <input type="range" id="theme-slider" min="0" max="1" step="0.01" value="0.9" oninput="syncTheme('slider')">
    <input type="number" id="theme-alpha" style="width:55px" min="0" max="1" step="0.01" value="0.9" oninput="syncTheme('number')">
  </div>
  <button onclick="addColumn()" style="margin-left: auto;">➕ Thêm cột</button> 
  <button class="btn-gen" onclick="generate()">Generate Snapshot</button>
</div>

<table id="tbl">
  <tr id="row-labels"><th class="header-label">TITLE</th></tr>
  <tr id="row-red-input"><td rowspan="2" class="header-label" style="color:#ff5252">FAILED</td></tr>
  <tr id="row-red-render"></tr>
  <tr id="row-green-input"><td rowspan="2" class="header-label" style="color:#23c466">SUCCESS</td></tr>
  <tr id="row-green-render"></tr>
  <tr id="row-yellow-input"><td rowspan="2" class="header-label" style="color:#f3bf3d">INDICATOR</td></tr>
  <tr id="row-yellow-render"></tr>
</table>

<textarea id="output" placeholder="Mã HTML snapshot sẽ hiện ở đây..."></textarea>

<script>
function syncTheme(type) {
    const p = document.getElementById('theme-picker'), h = document.getElementById('theme-hex'), 
          s = document.getElementById('theme-slider'), n = document.getElementById('theme-alpha');
    if (type === 'picker') h.value = p.value;
    if (type === 'hex') p.value = h.value;
    if (type === 'slider') n.value = s.value;
    if (type === 'number') s.value = n.value;
    render();
}

function getThemeRgba() {
    const hex = document.getElementById('theme-hex').value, alpha = document.getElementById('theme-alpha').value;
    const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function deleteColumn(btn) {
    const cell = btn.parentElement;
    const index = cell.cellIndex;
    const rows = document.getElementById("tbl").rows;
    for (let row of rows) {
        if (row.cells[index]) row.deleteCell(index);
        else if (row.cells[index-1] && row.id.includes('render')) row.deleteCell(index-1);
    }
    render();
}

function addColumn() {
  const tdLabel = document.createElement("td");
  tdLabel.innerHTML = `<input type="text" class="label-input" value="Label" oninput="render()"><button class="btn-del-col" onclick="deleteColumn(this)">✕</button>`;
  document.getElementById("row-labels").appendChild(tdLabel);

  const groups = [{id:'red', c:'#ff5252', icon:'✖'}, {id:'green', c:'#23c466', icon:'✔'}, {id:'yellow', c:'#f3bf3d', icon:'●'}];
  groups.forEach(g => {
    const td = document.createElement("td");
    td.innerHTML = `
      <div style="display:flex; flex-direction:column; align-items:center;">
        <div style="display:flex; align-items:center; gap:5px;">
          <input type="color" class="picker" value="${g.c}" oninput="this.nextElementSibling.value=this.value; render()">
          <input type="text" class="hex-input" style="width:65px; font-size:11px;" value="${g.c}" oninput="render()">
        </div>
        <div class="tickers-container">
          <label class="ticker-wrap"><input type="checkbox" class="is-special" onchange="render()"> Hidden</label>
          <label class="ticker-wrap"><input type="checkbox" class="is-icon" onchange="render()"> Icon</label>
        </div>
      </div>`;
    td.dataset.icon = g.icon;
    document.getElementById(`row-${g.id}-input`).appendChild(td);
  });
  render();
}

function render() {
  const theme = getThemeRgba();
  ['red', 'green', 'yellow'].forEach(g => {
    const inputCells = document.querySelectorAll(`#row-${g}-input td:not(.header-label)`);
    const renderRow = document.getElementById(`row-${g}-render`);
    renderRow.innerHTML = "";

    inputCells.forEach((cell) => {
      const hex = cell.querySelector('.hex-input').value;
      const isSpecial = cell.querySelector('.is-special').checked;
      const showIcon = cell.querySelector('.is-icon').checked;
      const icon = cell.dataset.icon;
      
      cell.querySelector('.is-icon').disabled = isSpecial;
      cell.querySelector('.is-icon').parentElement.style.opacity = isSpecial ? "0.3" : "1";
      cell.rowSpan = isSpecial ? 2 : 1;

      if (!isSpecial) {
        const td = document.createElement("td");
        td.style.background = theme;
        td.style.color = hex;
        const iconSpan = showIcon ? `<span style="font-size:12px; margin-right:8px; line-height:1;">${icon}</span>` : "";
        td.innerHTML = `<div class="tippy-style-live">${iconSpan}<span style="line-height:1;">Placeholder</span></div>`;
        renderRow.appendChild(td);
      }
    });
  });
}

function generate() {
  const theme = getThemeRgba();
  const labels = document.querySelectorAll("#row-labels .label-input");
  // Thêm font-smoothing trực tiếp vào thẻ table của snapshot
  let html = `<table style="border-collapse:collapse; text-align:center; font-family:'Roboto', sans-serif; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;">\n`;
  
  html += `  <tr><td style="border:1px solid #ccc; padding:10px; font-weight:500; background:#eee; font-size:14px;">TITLE</td>`;
  labels.forEach(l => html += `<td style="border:1px solid #ccc; padding:10px; font-weight:500; background:#fffde7; font-size:14px;">${l.value}</td>`);
  html += `</tr>\n`;

  const groups = [{l:'FAILED', c:'#ff5252', id:'red', icon:'✖'}, {l:'SUCCESS', c:'#23c466', id:'green', icon:'✔'}, {l:'INDICATOR', c:'#f3bf3d', id:'yellow', icon:'●'}];
  
  groups.forEach(g => {
    const colorCells = document.querySelectorAll(`#row-${g.id}-input td:not(.header-label)`);
    html += `  <tr><td rowspan="2" style="border:1px solid #ccc; padding:10px; font-weight:500; color:${g.c}; background:#f2f2f2; font-size:14px;">${g.l}</td>`;
    
    colorCells.forEach(cell => {
      const hex = cell.querySelector('.hex-input').value;
      const isSpec = cell.querySelector('.is-special').checked;
      if(isSpec) { 
          html += `<td rowspan="2" style="border:1px solid #ccc; padding:10px; background:${theme}; color:white; font-size:14px; font-weight:400;">không có thông tin</td>`; 
      } else { 
          html += `<td style="border:1px solid #ccc; padding:8px; font-size:11px; font-family:monospace; color:#333;">${hex.toUpperCase()}</td>`; 
      }
    });
    html += `</tr>\n  <tr>`;
    
    colorCells.forEach(cell => {
      const hex = cell.querySelector('.hex-input').value;
      const isSpec = cell.querySelector('.is-special').checked;
      const showIcon = cell.querySelector('.is-icon').checked;
      if(!isSpec) {
        html += `<td style="border:1px solid #ccc; padding:12px; background:${theme}; color:${hex};">`;
        // Container đồng bộ style tippy-style-live
        html += `<div style="display:inline-flex; align-items:center; justify-content:center; font-size:14px; font-weight:400; letter-spacing:0.1px;">`;
        if (showIcon) html += `<span style="font-size:12px; margin-right:8px; line-height:1;">${g.icon}</span>`;
        html += `<span style="line-height:1;">Placeholder</span></div></td>`;
      }
    });
    html += `</tr>\n`;
  });

  html += `</table>`;
  document.getElementById("output").value = html;
}

addColumn(); addColumn();
</script>
</body>
</html>
