<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Color Table Tool - Dynamic Rows & Cols</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');

  body { font-family: 'Roboto', sans-serif; padding: 20px; background-color: #f8f9fa; -webkit-font-smoothing: antialiased; }
  table { border-collapse: collapse; margin-top: 10px; text-align: center; font-size: 14px; background: white; }
  td, th { border: 1px solid #ccc; padding: 12px; text-align: center; min-width: 160px; position: relative; }
  
  .theme-controls { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
  .control-group { display: flex; align-items: center; gap: 8px; border-left: 2px solid #eee; padding-left: 15px; }
  .control-group:first-child { border-left: none; padding-left: 0; }
  
  .picker { width: 30px; height: 30px; padding: 0; border: none; cursor: pointer; background: none; vertical-align: middle; }
  .hex-input, .label-input { width: 90%; padding: 6px; border: 1px solid #ccc; border-radius: 3px; text-align: center; font-family: monospace; }
  .label-input { font-family: 'Roboto', sans-serif; font-weight: 500; background: #fffde7; }
  .row-label-input { background: #f2f2f2; font-weight: 500; color: inherit; width: 80px; }

  /* Nút xóa */
  .btn-del {
    position: absolute; top: 2px; right: 2px;
    background: #ff4d4f; color: white; border: none; border-radius: 3px;
    width: 18px; height: 18px; font-size: 10px; cursor: pointer;
    line-height: 18px; padding: 0; opacity: 0.4; transition: 0.2s;
  }
  .btn-del:hover { opacity: 1; }

  .tippy-style-live {
    font-family: 'Roboto', sans-serif; font-weight: 400; font-size: 14px;
    display: inline-flex; align-items: center; gap: 8px; justify-content: center;
    letter-spacing: 0.1px; -webkit-font-smoothing: antialiased;
  }

  .header-label-cell { font-weight: 500; width: 100px; background: #f2f2f2; position: relative; }
  textarea { width: 100%; height: 180px; margin-top: 15px; font-family: monospace; padding: 10px; border: 1px solid #ccc; background: #222; color: #7fdbff; }
  
  button { padding: 8px 15px; cursor: pointer; font-weight: 500; border-radius: 4px; border: 1px solid #ccc; }
  .btn-gen { background: #27ae60; color: white; border: none; }
  .btn-add { background: #3498db; color: white; border: none; }
  
  .tickers-container { display: flex; flex-direction: column; align-items: flex-start; margin-top: 8px; gap: 4px; width: fit-content; margin-left: auto; margin-right: auto; }
  .ticker-wrap { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #555; cursor: pointer; }
</style>
</head>
<body>

<div class="theme-controls">
  <div class="control-group">
    <strong>Theme:</strong>
    <input type="color" id="theme-picker" class="picker" value="#2d2d2d" oninput="syncTheme('picker')">
    <input type="text" id="theme-hex" class="hex-input" style="width:75px" value="#2d2d2d" oninput="syncTheme('hex')">
  </div>
  <div class="control-group">
    <label>Alpha:</label>
    <input type="range" id="theme-slider" min="0" max="1" step="0.01" value="0.9" oninput="syncTheme('slider')">
    <input type="number" id="theme-alpha" style="width:55px" min="0" max="1" step="0.01" value="0.9" oninput="syncTheme('number')">
  </div>
  <div style="margin-left: auto; display: flex; gap: 10px;">
    <button class="btn-add" onclick="addRow()">➕ Thêm hàng</button>
    <button class="btn-add" onclick="addColumn()">➕ Thêm cột</button> 
    <button class="btn-gen" onclick="generate()">Generate Snapshot</button>
  </div>
</div>

<table id="tbl">
  <tr id="row-labels"><th class="header-label-cell">TITLE</th></tr>
</table>

<textarea id="output" placeholder="Mã HTML snapshot..."></textarea>

<script>
let rowCount = 0;

function syncTheme(type) {
    const p = document.getElementById('theme-picker'), h = document.getElementById('theme-hex'), 
          s = document.getElementById('theme-slider'), n = document.getElementById('theme-alpha');
    if (type === 'picker') h.value = p.value;
    if (type === 'hex') p.value = h.value;
    if (type === 'slider') n.value = s.value;
    if (type === 'number') s.value = n.value;
    render();
}

function getThemeRgba() {
    const hex = document.getElementById('theme-hex').value, alpha = document.getElementById('theme-alpha').value;
    const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function addColumn() {
    const table = document.getElementById("tbl");
    const rows = table.rows;
    
    // Add to Title row
    const th = document.createElement("td");
    th.innerHTML = `<input type="text" class="label-input" value="Label" oninput="render()"><button class="btn-del" onclick="deleteColumn(this)">✕</button>`;
    rows[0].appendChild(th);

    // Add to existing Input/Render rows
    for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (row.classList.contains('input-row')) {
            const td = createInputCell(row.dataset.icon, row.dataset.color);
            row.appendChild(td);
        }
    }
    render();
}

function addRow(name = "NEW ROW", color = "#888888", icon = "●") {
    const table = document.getElementById("tbl");
    const colCount = table.rows[0].cells.length - 1;
    const rId = 'row-grp-' + rowCount++;

    // Create Input Row
    const rowInput = table.insertRow(-1);
    rowInput.id = rId + '-input';
    rowInput.className = 'input-row';
    rowInput.dataset.icon = icon;
    rowInput.dataset.color = color;

    const headCell = document.createElement("td");
    headCell.rowSpan = 2;
    headCell.className = 'header-label-cell';
    headCell.style.color = color;
    headCell.innerHTML = `
        <input type="text" class="row-label-input" value="${name}" oninput="this.parentElement.style.color=this.nextElementSibling.value; render()">
        <input type="hidden" value="${color}">
        <button class="btn-del" onclick="deleteRow('${rId}')">✕</button>
    `;
    rowInput.appendChild(headCell);

    // Create Render Row
    const rowRender = table.insertRow(-1);
    rowRender.id = rId + '-render';
    rowRender.className = 'render-row';

    for (let i = 0; i < colCount; i++) {
        rowInput.appendChild(createInputCell(icon, color));
    }
    render();
}

function createInputCell(icon, color) {
    const td = document.createElement("td");
    td.innerHTML = `
      <div style="display:flex; flex-direction:column; align-items:center;">
        <div style="display:flex; align-items:center; gap:5px;">
          <input type="color" class="picker" value="${color}" oninput="this.nextElementSibling.value=this.value; render()">
          <input type="text" class="hex-input" style="width:65px; font-size:11px;" value="${color}" oninput="render()">
        </div>
        <div class="tickers-container">
          <label class="ticker-wrap"><input type="checkbox" class="is-special" onchange="render()"> Hidden</label>
          <label class="ticker-wrap"><input type="checkbox" class="is-icon" onchange="render()"> Icon</label>
        </div>
      </div>`;
    return td;
}

function deleteColumn(btn) {
    const index = btn.parentElement.cellIndex;
    const rows = document.getElementById("tbl").rows;
    for (let row of rows) {
        if (row.classList.contains('render-row')) {
            // Logic xóa ở hàng render phức tạp hơn do Hidden, tốt nhất là render() lại
        }
        row.deleteCell(index);
    }
    render();
}

function deleteRow(rId) {
    document.getElementById(rId + '-input').remove();
    document.getElementById(rId + '-render').remove();
    render();
}

function render() {
    const theme = getThemeRgba();
    const table = document.getElementById("tbl");
    const inputRows = table.querySelectorAll('.input-row');

    inputRows.forEach(inRow => {
        const renderRow = inRow.nextElementSibling;
        const icon = inRow.dataset.icon;
        const inputCells = inRow.querySelectorAll('td:not(.header-label-cell)');
        
        renderRow.innerHTML = "";
        inputCells.forEach(cell => {
            const hex = cell.querySelector('.hex-input').value;
            const isSpec = cell.querySelector('.is-special').checked;
            const isIcon = cell.querySelector('.is-icon').checked;
            
            cell.rowSpan = isSpec ? 2 : 1;
            cell.querySelector('.is-icon').disabled = isSpec;
            cell.querySelector('.is-icon').parentElement.style.opacity = isSpec ? "0.3" : "1";

            if (!isSpec) {
                const td = document.createElement("td");
                td.style.background = theme;
                td.style.color = hex;
                const iconHtml = isIcon ? `<span style="font-size:12px; margin-right:8px; line-height:1;">${icon}</span>` : "";
                td.innerHTML = `<div class="tippy-style-live">${iconHtml}<span style="line-height:1;">Placeholder</span></div>`;
                renderRow.appendChild(td);
            }
        });
    });
}

function generate() {
    const theme = getThemeRgba();
    const labels = document.querySelectorAll("#row-labels .label-input");
    let html = `<table style="border-collapse:collapse; text-align:center; font-family:'Roboto', sans-serif; -webkit-font-smoothing:antialiased;">\n`;
    
    // Header
    html += `  <tr><td style="border:1px solid #ccc; padding:10px; font-weight:500; background:#eee; font-size:14px;">TITLE</td>`;
    labels.forEach(l => html += `<td style="border:1px solid #ccc; padding:10px; font-weight:500; background:#fffde7; font-size:14px;">${l.value}</td>`);
    html += `</tr>\n`;

    // Data Rows
    const inputRows = document.querySelectorAll('.input-row');
    inputRows.forEach(inRow => {
        const rowTitle = inRow.querySelector('.row-label-input').value;
        const rowColor = inRow.querySelector('.header-label-cell').style.color;
        const icon = inRow.dataset.icon;
        const colorCells = inRow.querySelectorAll('td:not(.header-label-cell)');

        html += `  <tr><td rowspan="2" style="border:1px solid #ccc; padding:10px; font-weight:500; color:${rowColor}; background:#f2f2f2; font-size:14px;">${rowTitle}</td>`;
        colorCells.forEach(cell => {
            const hex = cell.querySelector('.hex-input').value;
            const isSpec = cell.querySelector('.is-special').checked;
            if(isSpec) html += `<td rowspan="2" style="border:1px solid #ccc; padding:10px; background:${theme}; color:white; font-size:14px;">không có thông tin</td>`;
            else html += `<td style="border:1px solid #ccc; padding:8px; font-size:11px; font-family:monospace; color:#333;">${hex.toUpperCase()}</td>`;
        });
        html += `</tr>\n  <tr>`;
        colorCells.forEach(cell => {
            const hex = cell.querySelector('.hex-input').value;
            const isSpec = cell.querySelector('.is-special').checked;
            const isIcon = cell.querySelector('.is-icon').checked;
            if(!isSpec) {
                html += `<td style="border:1px solid #ccc; padding:12px; background:${theme}; color:${hex};">`;
                html += `<div style="display:inline-flex; align-items:center; justify-content:center; font-size:14px; font-weight:400; letter-spacing:0.1px;">`;
                if (isIcon) html += `<span style="font-size:12px; margin-right:8px; line-height:1;">${icon}</span>`;
                html += `<span style="line-height:1;">Placeholder</span></div></td>`;
            }
        });
        html += `</tr>\n`;
    });

    html += `</table>`;
    document.getElementById("output").value = html;
}

// Khởi tạo mặc định
addColumn();
addColumn();
addRow("FAILED", "#ff5252", "✖");
addRow("SUCCESS", "#23c466", "✔");
addRow("INDICATOR", "#f3bf3d", "●");
</script>
</body>
</html>
