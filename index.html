<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Color Table Tool - Merge Hidden Cells</title>
<style>
  body { font-family: sans-serif; padding: 20px; background-color: #f8f9fa; }
  table { border-collapse: collapse; margin-top: 10px; text-align: center; font-size: 13px; background: white; }
  td, th { border: 1px solid #ccc; padding: 8px; text-align: center; min-width: 140px; }
  
  .theme-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
  .alpha-box { display: flex; align-items: center; gap: 5px; border-left: 2px solid #eee; padding-left: 15px; }
  
  .picker { width: 30px; height: 30px; padding: 0; border: none; cursor: pointer; background: none; vertical-align: middle; }
  .hex-input, .label-input { width: 90%; padding: 4px; border: 1px solid #ccc; border-radius: 3px; text-align: center; }
  .label-input { font-weight: bold; background: #fffde7; }
  
  .ticker-wrap { display: flex; align-items: center; gap: 4px; font-size: 11px; margin-top: 5px; color: #666; justify-content: center; }
  .ticker-wrap input { cursor: pointer; margin: 0; }

  .header-label { font-weight: bold; width: 80px; background: #f2f2f2; }
  .preview-text { font-weight: bold; font-size: 14px; }
  textarea { width: 100%; height: 200px; margin-top: 15px; font-family: monospace; padding: 10px; }
  button { padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; border: 1px solid #ccc; }
  .btn-gen { background: #27ae60; color: white; border: none; }
</style>
</head>
<body>

<div class="theme-controls">
  <strong>Theme:</strong>
  <input type="color" id="theme-picker" class="picker" value="#ffffff" oninput="syncTheme('picker')">
  <input type="text" id="theme-hex" class="hex-input" style="width:70px" value="#ffffff" oninput="syncTheme('hex')">
  
  <div class="alpha-box">
    <label>Alpha:</label>
    <input type="range" id="theme-slider" min="0" max="1" step="0.01" value="1" oninput="syncTheme('slider')">
    <input type="number" id="theme-alpha" style="width:50px" min="0" max="1" step="0.01" value="1" oninput="syncTheme('number')">
  </div>

  <button onclick="addColumn()" style="margin-left: auto;">➕ Thêm cột</button> 
  <button class="btn-gen" onclick="generate()">Generate Snapshot</button>
</div>

<table id="tbl">
  <tr id="row-labels"><th class="header-label">TITLE</th></tr>
  <tr id="row-red-input"><td rowspan="2" class="header-label" style="color:red">RED</td></tr>
  <tr id="row-red-render"></tr>
  <tr id="row-green-input"><td rowspan="2" class="header-label" style="color:green">GREEN</td></tr>
  <tr id="row-green-render"></tr>
  <tr id="row-yellow-input"><td rowspan="2" class="header-label" style="color:#d4a017">YELLOW</td></tr>
  <tr id="row-yellow-render"></tr>
</table>

<textarea id="output"></textarea>

<script>
function syncTheme(type) {
    const p = document.getElementById('theme-picker'), h = document.getElementById('theme-hex'), 
          s = document.getElementById('theme-slider'), n = document.getElementById('theme-alpha');
    if (type === 'picker') h.value = p.value;
    if (type === 'hex') p.value = h.value;
    if (type === 'slider') n.value = s.value;
    if (type === 'number') s.value = n.value;
    render();
}

function getThemeRgba() {
    const hex = document.getElementById('theme-hex').value, alpha = document.getElementById('theme-alpha').value;
    const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function addColumn() {
  const tdLabel = document.createElement("td");
  tdLabel.innerHTML = `<input type="text" class="label-input" value="Label" oninput="render()">`;
  document.getElementById("row-labels").appendChild(tdLabel);

  const groups = [{id:'red', c:'#ff4d4f'}, {id:'green', c:'#52c41a'}, {id:'yellow', c:'#fadb14'}];
  groups.forEach(g => {
    const td = document.createElement("td");
    td.innerHTML = `
      <div style="display:flex; flex-direction:column; align-items:center;">
        <div style="display:flex; align-items:center; gap:5px;">
          <input type="color" class="picker" value="${g.c}" oninput="this.nextElementSibling.value=this.value; render()">
          <input type="text" class="hex-input" style="width:65px; font-size:11px;" value="${g.c}" oninput="render()">
        </div>
        <label class="ticker-wrap"><input type="checkbox" class="is-special" onchange="render()"> Hidden </label>
      </div>`;
    document.getElementById(`row-${g.id}-input`).appendChild(td);
  });
  render();
}

function render() {
  const theme = getThemeRgba();
  ['red', 'green', 'yellow'].forEach(g => {
    const inputCells = document.querySelectorAll(`#row-${g}-input td:not(.header-label)`);
    const renderRow = document.getElementById(`row-${g}-render`);
    renderRow.innerHTML = "";

    inputCells.forEach((cell) => {
      const hex = cell.querySelector('.hex-input').value;
      const isSpecial = cell.querySelector('.is-special').checked;
      
      // Cập nhật rowspan cho ô input màu nếu Hidden
      cell.rowSpan = isSpecial ? 2 : 1;

      if (!isSpecial) {
        const td = document.createElement("td");
        td.style.background = theme;
        td.innerHTML = `<span class="preview-text" style="color: ${hex}">Placeholder</span>`;
        renderRow.appendChild(td);
      }
      // Nếu isSpecial thì không tạo ô TD ở hàng render nữa (vì ô trên đã chiếm chỗ)
    });
  });
}

function generate() {
  const theme = getThemeRgba();
  const labels = document.querySelectorAll("#row-labels .label-input");
  let html = `<table style="border-collapse:collapse; text-align:center; font-family:sans-serif;">\n`;
  
  html += `  <tr><td style="border:1px solid #ccc; padding:10px; font-weight:bold; background:#eee;">TITLE</td>`;
  labels.forEach(l => html += `<td style="border:1px solid #ccc; padding:10px; font-weight:bold; background:#fffde7;">${l.value}</td>`);
  html += `</tr>\n`;

  const groups = [{l:'RED', c:'red', id:'red'}, {l:'GREEN', c:'green', id:'green'}, {l:'YELLOW', c:'#d4a017', id:'yellow'}];
  
  groups.forEach(g => {
    const colorCells = document.querySelectorAll(`#row-${g.id}-input td:not(.header-label)`);
    
    // Hàng 1
    html += `  <tr><td rowspan="2" style="border:1px solid #ccc; padding:10px; font-weight:bold; color:${g.c}; background:#f2f2f2;">${g.l}</td>`;
    colorCells.forEach(cell => {
      const hex = cell.querySelector('.hex-input').value;
      const isSpec = cell.querySelector('.is-special').checked;
      if(isSpec) {
        html += `<td rowspan="2" style="border:1px solid #ccc; padding:10px; background:${theme}; color:#666;">không có thông tin</td>`;
      } else {
        html += `<td style="border:1px solid #ccc; padding:8px; font-size:11px; font-family:monospace;">${hex.toUpperCase()}</td>`;
      }
    });
    html += `</tr>\n`;

    // Hàng 2
    html += `  <tr>`;
    colorCells.forEach(cell => {
      const hex = cell.querySelector('.hex-input').value;
      const isSpec = cell.querySelector('.is-special').checked;
      if(!isSpec) {
        html += `<td style="border:1px solid #ccc; padding:12px; background:${theme};"><span style="color:${hex}; font-weight:bold; font-size:14px;">Placeholder</span></td>`;
      }
    });
    html += `</tr>\n`;
  });

  html += `</table>`;
  document.getElementById("output").value = html;
}

addColumn(); addColumn();
</script>
</body>
</html>
