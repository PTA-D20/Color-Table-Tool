<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Color Table Tool - RGBA Theme</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  table { border-collapse: collapse; margin-top: 10px; text-align: center; font-family: 'Roboto', sans-serif; font-size: 14px; }
  td { border: 1px solid #ccc; padding: 10px; text-align: center; min-width: 120px; }
  
  /* Layout điều khiển Theme */
  .theme-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
  .alpha-box { display: flex; align-items: center; gap: 5px; border-left: 2px solid #ddd; padding-left: 15px; }
  
  .picker { width: 35px; height: 35px; padding: 0; border: none; cursor: pointer; background: none; vertical-align: middle; }
  .hex-input { width: 80px; text-align: center; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
  .alpha-input { width: 45px; text-align: center; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
  .slider { cursor: pointer; }

  .header-label { font-weight: bold; width: 80px; background: #f2f2f2; }
  .preview-text { font-weight: bold; }
  textarea { width: 100%; height: 200px; margin-top: 15px; font-family: monospace; }
  button { padding: 8px 15px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<div class="theme-controls">
  <strong>Theme:</strong>
  <input type="color" id="theme-picker" class="picker" value="#ffffff" oninput="syncTheme('picker')">
  <input type="text" id="theme-hex" class="hex-input" value="#ffffff" oninput="syncTheme('hex')">
  
  <div class="alpha-box">
    <label>Alpha:</label>
    <input type="range" id="theme-slider" class="slider" min="0" max="1" step="0.01" value="1" oninput="syncTheme('slider')">
    <input type="number" id="theme-alpha" class="alpha-input" min="0" max="1" step="0.01" value="1" oninput="syncTheme('number')">
  </div>

  <button onclick="addColumn()" style="margin-left: auto;">➕ Thêm cột</button> 
  <button onclick="generate()" style="background: #27ae60; color: white; border: none; border-radius: 4px;">Generate Snapshot</button>
</div>

<table id="tbl">
  <tr id="row-red-input"><td rowspan="2" class="header-label" style="color:red">RED</td></tr>
  <tr id="row-red"></tr>

  <tr id="row-green-input"><td rowspan="2" class="header-label" style="color:green">GREEN</td></tr>
  <tr id="row-green"></tr>

  <tr id="row-yellow-input"><td rowspan="2" class="header-label" style="color:#d4a017">YELLOW</td></tr>
  <tr id="row-yellow"></tr>
</table>

<textarea id="output" placeholder="Mã HTML snapshot sẽ xuất hiện ở đây..."></textarea>

<script>
let colId = 0;

// Chuyển Hex + Alpha sang RGBA
function getThemeRgba() {
    const hex = document.getElementById('theme-hex').value;
    const alpha = document.getElementById('theme-alpha').value;
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

// Đồng bộ hóa các thành phần điều khiển Theme
function syncTheme(type) {
    const picker = document.getElementById('theme-picker');
    const hexInput = document.getElementById('theme-hex');
    const slider = document.getElementById('theme-slider');
    const numInput = document.getElementById('theme-alpha');

    if (type === 'picker') hexInput.value = picker.value;
    if (type === 'hex') picker.value = hexInput.value;
    if (type === 'slider') numInput.value = slider.value;
    if (type === 'number') slider.value = numInput.value;

    render();
}

function createInputCell(color) {
  colId++;
  const pId = `p${colId}`;
  const tId = `t${colId}`;
  const td = document.createElement("td");
  td.innerHTML = `
    <div style="display:flex; align-items:center; justify-content:center; gap:5px;">
        <input type="color" id="${pId}" class="picker" style="width:25px; height:25px;" value="${color}" oninput="document.getElementById('${tId}').value=this.value; render()">
        <input type="text" id="${tId}" class="hex-input" style="width:65px; font-size:12px;" value="${color}" oninput="render()">
    </div>`;
  return td;
}

function addColumn() {
  document.getElementById("row-red-input").appendChild(createInputCell("#ff4d4f"));
  document.getElementById("row-green-input").appendChild(createInputCell("#52c41a"));
  document.getElementById("row-yellow-input").appendChild(createInputCell("#fadb14"));
  render();
}

function renderRow(renderRowId, inputRowId) {
  const themeRgba = getThemeRgba();
  const renderRow = document.getElementById(renderRowId);
  const inputs = document.querySelectorAll(`#${inputRowId} input[type="text"]`);
  
  renderRow.innerHTML = "";
  inputs.forEach(inp => {
    const td = document.createElement("td");
    td.style.background = themeRgba;
    const span = document.createElement("span");
    span.className = "preview-text";
    span.style.color = inp.value;
    span.innerText = "Placeholder";
    td.appendChild(span);
    renderRow.appendChild(td);
  });
}

function render() {
  renderRow("row-red", "row-red-input");
  renderRow("row-green", "row-green-input");
  renderRow("row-yellow", "row-yellow-input");
}

function generate() {
  const themeRgba = getThemeRgba();
  let html = `<table style="border-collapse:collapse; text-align:center; font-family:sans-serif;">\n`;
  const configs = [
      {label: 'RED', color: 'red', inputRow: 'row-red-input'},
      {label: 'GREEN', color: 'green', inputRow: 'row-green-input'},
      {label: 'YELLOW', color: '#d4a017', inputRow: 'row-yellow-input'}
  ];

  configs.forEach(conf => {
    const inputs = document.querySelectorAll(`#${conf.inputRow} input[type="text"]`);
    html += `  <tr>\n    <td rowspan="2" style="border:1px solid #ccc; padding:10px; font-weight:bold; color:${conf.color}; background:#f2f2f2;">${conf.label}</td>\n`;
    inputs.forEach(inp => {
      html += `    <td style="border:1px solid #ccc; padding:10px; font-family:monospace;">${inp.value.toUpperCase()}</td>\n`;
    });
    html += `  </tr>\n`;
    html += `  <tr>\n`;
    inputs.forEach(inp => {
      html += `    <td style="border:1px solid #ccc; padding:10px; background:${themeRgba};">\n      <span style="color:${inp.value}; font-weight:bold;">Placeholder</span>\n    </td>\n`;
    });
    html += `  </tr>\n`;
  });

  html += `</table>`;
  document.getElementById("output").value = html;
}

// Khởi tạo
addColumn();
addColumn();
</script>
</body>
</html>
